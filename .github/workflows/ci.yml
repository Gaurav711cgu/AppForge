name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check
      - name: Verify all required files exist
        run: |
          for f in types/index.ts lib/llm-client.ts lib/pipeline.ts lib/pipeline/stage1-intent.ts lib/pipeline/stage2-architecture.ts lib/pipeline/stage3-schemas.ts lib/validator.ts lib/repair.ts lib/runtime.ts lib/sql-executor.ts lib/evaluator.ts app/api/pipeline/route.ts; do
            [ -f "$f" ] && echo "✓ $f" || (echo "✗ MISSING: $f" && exit 1)
          done
